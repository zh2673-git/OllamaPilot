# ============================================
# OllamaPilot Channels 配置文件
# ============================================
# 
# 使用说明:
#   1. 复制此文件为 config.yaml（如果还没有）
#   2. 根据需要修改配置
#   3. 运行: python -m channels.runner
#
# 注意: 此文件包含敏感信息，请勿提交到版本控制！


# ============================================
# Agent 配置
# ============================================
agent:
  # 对话模型名称
  # 可选: qwen3.5:4b, llama3.2, deepseek-r1:14b 等
  model: "qwen3.5:4b"
  
  # Skill 目录路径
  # 相对于项目根目录，或绝对路径
  skills_dir: "./skills"
  
  # 是否显示详细日志
  verbose: true


# ============================================
# 全局权限配置
# ============================================
global:
  # 全局白名单（所有渠道生效）
  # 为空数组 [] 表示允许所有用户
  # 示例: ["123456789", "987654321"]
  whitelist: []
  
  # 管理员用户列表
  # 管理员可使用特殊命令（如 /status, /reload 等）
  admin_users: []


# ============================================
# QQ 渠道配置
# ============================================
# 前置条件:
#   1. 下载并部署 go-cqhttp: https://github.com/Mrs4s/go-cqhttp
#   2. 配置 QQ 账号，启动 go-cqhttp
#   3. 确保 go-cqhttp 的 HTTP 和 WebSocket 服务已启用
#
qq:
  # 是否启用 QQ 渠道
  enabled: false
  
  # go-cqhttp HTTP API 地址
  api_url: "http://127.0.0.1:5700"
  
  # go-cqhttp WebSocket 地址
  ws_url: "ws://127.0.0.1:5701"
  
  # 机器人 QQ 号
  bot_qq: "123456789"
  
  # 白名单（仅允许这些 QQ 号使用）
  # 为空数组 [] 表示允许所有用户（不推荐）
  whitelist:
    - "987654321"  # 你的 QQ 号
  
  # 群聊中只响应 @机器人的消息
  # true: 只有 @机器人 才响应
  # false: 响应所有消息
  at_only_in_group: true


# ============================================
# 飞书渠道配置
# ============================================
# 前置条件:
#   1. 登录飞书开放平台: https://open.feishu.cn/
#   2. 创建企业自建应用
#   3. 开启"机器人"能力
#   4. 获取 App ID 和 App Secret
#   5. 配置事件订阅（Webhook 地址）
#
feishu:
  # 是否启用飞书渠道
  enabled: false
  
  # 飞书应用 ID
  # 从飞书开放平台获取
  app_id: "cli_xxxxxxxxxx"
  
  # 飞书应用密钥
  # 从飞书开放平台获取
  app_secret: "xxxxxxxxxx"
  
  # 消息加密密钥（可选）
  # 如果启用了消息加密，需要填写
  encrypt_key: ""
  
  # 验证 Token（可选）
  # 用于验证 Webhook 请求
  verification_token: ""
  
  # 白名单（仅允许这些用户使用）
  # 使用用户的 OpenID
  whitelist: []
  
  # 群聊中只响应 @机器人的消息
  at_only_in_group: true


# ============================================
# 钉钉渠道配置
# ============================================
# 前置条件:
#   1. 登录钉钉开放平台: https://open.dingtalk.com/
#   2. 创建企业内部应用
#   3. 添加"机器人"能力
#   4. 获取 App Key 和 App Secret
#   5. 配置回调 URL
#
dingtalk:
  # 是否启用钉钉渠道
  enabled: false
  
  # 钉钉 App Key
  # 从钉钉开放平台获取
  app_key: "xxxxxxxxxx"
  
  # 钉钉 App Secret
  # 从钉钉开放平台获取
  app_secret: "xxxxxxxxxx"
  
  # 机器人编码（可选）
  # 用于识别机器人身份
  robot_code: ""
  
  # Webhook Token（用于发送群消息）
  # 从群机器人设置中获取
  webhook_token: ""
  
  # 白名单（仅允许这些用户使用）
  # 使用用户的 UserID
  whitelist: []
  
  # 群聊中只响应 @机器人的消息
  at_only_in_group: true
